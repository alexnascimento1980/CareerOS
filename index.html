<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador CareerOS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
              <h4 class="mb-0">CareerOS - Gerador de Currículo</h4>
            </div>
            <div class="card-body">
              <form id="cv-form">
                <h5 class="border-bottom pb-2 mb-3">Dados Básicos</h5>

                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="name" class="form-label">Nome Completo</label>
                    <input
                      type="text"
                      class="form-control"
                      id="name"
                      required
                      placeholder="Ex: Alex Nascimento"
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="label_pt" class="form-label"
                      >Título Profissional</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="label_pt"
                      required
                      placeholder="Ex: Ciência de Dados | Logística"
                    />
                  </div>
                </div>

                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="email" class="form-label">E-mail</label>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="phone" class="form-label">Telefone</label>
                    <input
                      type="text"
                      class="form-control"
                      id="phone"
                      required
                    />
                  </div>
                </div>

                <div class="row mb-4">
                  <div class="col-md-4">
                    <label for="location" class="form-label">Localização</label>
                    <input
                      type="text"
                      class="form-control"
                      id="location"
                      required
                    />
                  </div>
                  <div class="col-md-4">
                    <label for="linkedin" class="form-label">LinkedIn</label>
                    <input
                      type="text"
                      class="form-control"
                      id="linkedin"
                      required
                    />
                  </div>
                  <div class="col-md-4">
                    <label for="github" class="form-label">GitHub</label>
                    <input
                      type="text"
                      class="form-control"
                      id="github"
                      required
                    />
                  </div>
                </div>

                <div class="d-grid gap-2">
                  <button
                    type="submit"
                    class="btn btn-success btn-lg"
                    id="btn-gerar"
                  >
                    Gerar Currículo PDF
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
