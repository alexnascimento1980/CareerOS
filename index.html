<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerOS - Gerador de Currículo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-md-9">
          <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
              <h4 class="mb-0">CareerOS - Gerador de Currículo</h4>
            </div>
            <div class="card-body">
              <form id="cv-form">
                <h5 class="border-bottom pb-2 mb-3 text-primary">
                  1. Dados Básicos
                </h5>
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Nome Completo</label>
                    <input
                      type="text"
                      class="form-control"
                      id="name"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-bold"
                      >Título Profissional</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="label_pt"
                      required
                    />
                  </div>
                </div>
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label class="form-label fw-bold">E-mail</label>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      required
                      title="Insira um endereço de e-mail válido"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Telefone</label>
                    <input
                      type="tel"
                      class="form-control"
                      id="phone"
                      required
                      pattern="^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$"
                      title="Formato aceito: (XX) XXXXX-XXXX"
                    />
                  </div>
                </div>
                <div class="row mb-4">
                  <div class="col-md-4">
                    <label class="form-label fw-bold">Localização</label>
                    <input
                      type="text"
                      class="form-control"
                      id="location"
                      required
                    />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label fw-bold">LinkedIn</label>
                    <input
                      type="text"
                      class="form-control"
                      id="linkedin"
                      required
                      pattern="^(https?:\/\/)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(?:\/[^\s]*)?$"
                      title="Insira um link de perfil válido (ex: linkedin.com/in/usuario)"
                    />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label fw-bold">GitHub</label>
                    <input
                      type="text"
                      class="form-control"
                      id="github"
                      required
                      pattern="^(https?:\/\/)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(?:\/[^\s]*)?$"
                      title="Insira um link de perfil válido (ex: github.com/usuario)"
                    />
                  </div>
                </div>

                <h5 class="border-bottom pb-2 mb-3 text-primary">
                  2. Resumo Profissional
                </h5>
                <div class="mb-4">
                  <textarea
                    class="form-control"
                    id="summary_pt"
                    rows="3"
                    required
                  ></textarea>
                </div>

                <h5 class="border-bottom pb-2 mb-3 text-primary">
                  3. Experiência Profissional
                </h5>
                <div id="experiencias-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-primary btn-sm"
                    onclick="adicionarExperiencia()"
                  >
                    + Adicionar Experiência
                  </button>
                </div>

                <h5 class="border-bottom pb-2 mt-4 mb-3 text-primary">
                  4. Formação Acadêmica
                </h5>
                <div id="formacao-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-info btn-sm"
                    onclick="adicionarFormacao()"
                  >
                    + Adicionar Formação
                  </button>
                </div>

                <h5 class="border-bottom pb-2 mt-4 mb-3 text-primary">
                  5. Cursos Complementares
                </h5>
                <div id="cursos-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-success btn-sm"
                    onclick="adicionarCurso()"
                  >
                    + Adicionar Curso
                  </button>
                </div>

                <div
                  class="d-flex justify-content-between align-items-center border-bottom pb-2 mt-4 mb-3"
                >
                  <h5 class="mb-0 text-primary">6. Projetos Técnicos</h5>
                  <div class="form-check form-switch">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="include-projects"
                      checked
                    />
                    <label
                      class="form-check-label fw-bold text-warning"
                      for="include-projects"
                      >Incluir no PDF?</label
                    >
                  </div>
                </div>
                <div id="projetos-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-warning btn-sm"
                    id="btn-add-proj"
                    onclick="adicionarProjeto()"
                  >
                    + Adicionar Projeto
                  </button>
                </div>

                <h5 class="border-bottom pb-2 mt-4 mb-3 text-primary">
                  7. Habilidades e Ferramentas
                </h5>
                <div class="mb-4">
                  <label class="form-label fw-bold"
                    >Tecnologias (Separe por vírgula)</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="skills"
                    required
                  />
                </div>

                <h5 class="border-bottom pb-2 mt-5 mb-3 text-success">
                  8. Exportar Documento
                </h5>
                <div class="row mb-4">
                  <div class="col-md-12">
                    <label class="form-label fw-bold"
                      >Escolha o idioma do PDF final:</label
                    >
                    <select
                      class="form-select border-success form-select-lg"
                      id="idioma_escolhido"
                    >
                      <option value="pt" selected>Português</option>
                      <option value="en">Inglês (Tradução Automática)</option>
                    </select>
                  </div>
                </div>

                <div class="d-grid gap-2">
                  <button
                    type="submit"
                    class="btn btn-success btn-lg shadow"
                    id="btn-gerar"
                  >
                    Gerar Currículo PDF
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
