<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerOS - Gerador de Currículo Bilíngue</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-md-10">
          <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
              <h4 class="mb-0">CareerOS - Gerador de Currículo</h4>
            </div>
            <div class="card-body">
              <form id="cv-form">
                <h5 class="border-bottom pb-2 mb-3 text-primary">
                  1. Dados Básicos
                </h5>
                <div class="row mb-3">
                  <div class="col-md-12 mb-3">
                    <label for="name" class="form-label fw-bold"
                      >Nome Completo</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="name"
                      required
                      placeholder="Ex: Alex Nascimento"
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="label_pt" class="form-label fw-bold"
                      >Título Profissional (Português)</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="label_pt"
                      required
                      placeholder="Ex: Logística | Ciência de Dados"
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="label_en" class="form-label fw-bold"
                      >Título Profissional (Inglês)</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="label_en"
                      required
                      placeholder="Ex: Logistics | Data Science"
                    />
                  </div>
                </div>
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="email" class="form-label fw-bold">E-mail</label>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      required
                      placeholder="alex@email.com"
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="phone" class="form-label fw-bold"
                      >Telefone</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="phone"
                      required
                      placeholder="(19) 98290-7060"
                    />
                  </div>
                </div>
                <div class="row mb-4">
                  <div class="col-md-4">
                    <label for="location" class="form-label fw-bold"
                      >Localização</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="location"
                      required
                      placeholder="Indaiatuba, São Paulo"
                    />
                  </div>
                  <div class="col-md-4">
                    <label for="linkedin" class="form-label fw-bold"
                      >LinkedIn (Link limpo)</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="linkedin"
                      required
                      placeholder="linkedin.com/in/username"
                    />
                  </div>
                  <div class="col-md-4">
                    <label for="github" class="form-label fw-bold"
                      >GitHub (Link limpo)</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="github"
                      required
                      placeholder="github.com/username"
                    />
                  </div>
                </div>

                <h5 class="border-bottom pb-2 mb-3 text-primary">
                  2. Resumo Profissional
                </h5>
                <div class="row mb-4">
                  <div class="col-md-6">
                    <label for="summary_pt" class="form-label fw-bold"
                      >Resumo (Português)</label
                    >
                    <textarea
                      class="form-control"
                      id="summary_pt"
                      rows="4"
                      required
                      placeholder="Experiência em operações logísticas..."
                    ></textarea>
                  </div>
                  <div class="col-md-6">
                    <label for="summary_en" class="form-label fw-bold"
                      >Resumo (Inglês)</label
                    >
                    <textarea
                      class="form-control"
                      id="summary_en"
                      rows="4"
                      required
                      placeholder="Experience in logistics operations..."
                    ></textarea>
                  </div>
                </div>

                <h5 class="border-bottom pb-2 mb-3 text-primary">
                  3. Experiência Profissional
                </h5>
                <div id="experiencias-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-primary btn-sm"
                    onclick="adicionarExperiencia()"
                  >
                    + Adicionar Experiência
                  </button>
                </div>

                <h5 class="border-bottom pb-2 mt-4 mb-3 text-primary">
                  4. Formação Acadêmica
                </h5>
                <div id="formacao-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-info btn-sm"
                    onclick="adicionarFormacao()"
                  >
                    + Adicionar Formação
                  </button>
                </div>

                <h5 class="border-bottom pb-2 mt-4 mb-3 text-primary">
                  5. Projetos Técnicos
                </h5>
                <div id="projetos-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-warning btn-sm"
                    onclick="adicionarProjeto()"
                  >
                    + Adicionar Projeto
                  </button>
                </div>

                <h5 class="border-bottom pb-2 mt-4 mb-3 text-primary">
                  6. Habilidades e Ferramentas
                </h5>
                <div class="mb-4">
                  <label class="form-label fw-bold"
                    >Tecnologias (Separe por vírgula)</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="skills"
                    required
                    placeholder="Python, SQL, Power BI, Git, SAP"
                  />
                </div>

                <h5 class="border-bottom pb-2 mt-5 mb-3 text-success">
                  7. Exportar Documento
                </h5>
                <div class="row mb-4">
                  <div class="col-md-12">
                    <label for="idioma_escolhido" class="form-label fw-bold"
                      >Escolha o idioma do PDF final:</label
                    >
                    <select
                      class="form-select border-success form-select-lg"
                      id="idioma_escolhido"
                    >
                      <option value="pt" selected>
                        Português (Gera com dados e cabeçalhos em PT)
                      </option>
                      <option value="en">
                        Inglês (Gera com dados e cabeçalhos em EN)
                      </option>
                    </select>
                  </div>
                </div>

                <div class="d-grid gap-2">
                  <button
                    type="submit"
                    class="btn btn-success btn-lg shadow"
                    id="btn-gerar"
                  >
                    Gerar Currículo PDF
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
