<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerOS - Gerador de Currículo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
              <h4 class="mb-0">CareerOS - Gerador de Currículo</h4>
            </div>
            <div class="card-body">
              <form id="cv-form">
                <h5 class="border-bottom pb-2 mb-3">Dados Básicos</h5>
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="name" class="form-label">Nome Completo</label>
                    <input
                      type="text"
                      class="form-control"
                      id="name"
                      required
                      placeholder="Ex: Alex Nascimento"
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="label_pt" class="form-label"
                      >Título Profissional</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="label_pt"
                      required
                      placeholder="Ex: Logística e Supply Chain | Estudante de Ciência de Dados"
                    />
                  </div>
                </div>
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="email" class="form-label">E-mail</label>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      required
                      placeholder="Ex: alex_nascto@hotmail.com"
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="phone" class="form-label">Telefone</label>
                    <input
                      type="text"
                      class="form-control"
                      id="phone"
                      required
                      placeholder="Ex: (19) 98290-7060"
                    />
                  </div>
                </div>
                <div class="row mb-4">
                  <div class="col-md-4">
                    <label for="location" class="form-label">Localização</label>
                    <input
                      type="text"
                      class="form-control"
                      id="location"
                      required
                      placeholder="Ex: Indaiatuba, São Paulo"
                    />
                  </div>
                  <div class="col-md-4">
                    <label for="linkedin" class="form-label">LinkedIn</label>
                    <input
                      type="text"
                      class="form-control"
                      id="linkedin"
                      required
                      placeholder="Ex: linkedin.com/in/alexnascimento1980"
                    />
                  </div>
                  <div class="col-md-4">
                    <label for="github" class="form-label">GitHub</label>
                    <input
                      type="text"
                      class="form-control"
                      id="github"
                      required
                      placeholder="Ex: github.com/username"
                    />
                  </div>
                </div>

                <h5 class="border-bottom pb-2 mb-3">Resumo Profissional</h5>
                <div class="mb-4">
                  <label class="form-label"
                    >Cole aqui o seu parágrafo de resumo</label
                  >
                  <textarea
                    class="form-control"
                    id="summary"
                    rows="3"
                    required
                    placeholder="Ex: Profissional com experiência em operações logísticas..."
                  ></textarea>
                </div>

                <h5 class="border-bottom pb-2 mb-3">
                  Experiência Profissional
                </h5>
                <div id="experiencias-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-primary btn-sm"
                    onclick="adicionarExperiencia()"
                  >
                    + Adicionar Experiência
                  </button>
                </div>

                <h5 class="border-bottom pb-2 mt-4 mb-3">Formação Acadêmica</h5>
                <div id="formacao-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-info btn-sm"
                    onclick="adicionarFormacao()"
                  >
                    + Adicionar Formação
                  </button>
                </div>

                <h5 class="border-bottom pb-2 mt-4 mb-3">Projetos Técnicos</h5>
                <div id="projetos-container"></div>
                <div class="mb-4">
                  <button
                    type="button"
                    class="btn btn-outline-warning btn-sm"
                    onclick="adicionarProjeto()"
                  >
                    + Adicionar Projeto
                  </button>
                </div>

                <h5 class="border-bottom pb-2 mt-4 mb-3">
                  Habilidades e Ferramentas
                </h5>
                <div class="mb-4">
                  <label class="form-label"
                    >Tecnologias (Separe por vírgula)</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="skills"
                    required
                    placeholder="Ex: Python, SQL, Power BI, Git, SAP"
                  />
                </div>

                <div class="d-grid gap-2 mt-5">
                  <button
                    type="submit"
                    class="btn btn-success btn-lg"
                    id="btn-gerar"
                  >
                    Gerar Currículo PDF
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
