name: Release

on:

  workflow_dispatch:

jobs:

  release:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build

        run: |

          npm install

          npm run sync

      - name: Upload Artifact

        uses: actions/upload-artifact@v4

        with:

          name: CareerOS

          path: .
