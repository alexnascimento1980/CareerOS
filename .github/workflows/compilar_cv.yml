name: Gerar Curriculos PDF

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar o repositório
        uses: actions/checkout@v4 # Atualizado (v4) para corrigir o aviso do Node.js

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5 # Atualizado (v5) para corrigir o aviso do Node.js
        with:
          python-version: '3.10'

      - name: 📦 Instalar Jinja2
        run: pip install jinja2

      - name: ⚙️ Rodar o Gerador Python
        run: python gerador.py

      - name: 📄 Compilar LaTeX para PDF
        uses: xu-cheng/latex-action@v3
        with:
          # Como o diretório de trabalho já é a pasta 'saida', 
          # passamos apenas o nome final dos arquivos.
          root_file: |
            curriculo_ats_pt.tex
            curriculo_ats_en.tex
            curriculo_design_pt.tex
            curriculo_design_en.tex
          working_directory: saida 

      - name: 💾 Salvar PDFs como Artefatos
        uses: actions/upload-artifact@v4
        with:
          name: Meus_Curriculos_Gerados
          path: saida/*.pdf