name: Gerar Curriculos PDF
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: pip install jinja2 markupsafe

      - name: Rodar Gerador
        run: python gerador.py

      - name: Verificar se arquivo existe
        run: ls -R saida/

      - name: Compilar LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: curriculo_ats_pt.tex
          working_directory: saida