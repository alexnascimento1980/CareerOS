name: Testes Automatizados

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar TeX Live (necessário para os testes de geração de PDF)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-fonts-recommended

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Rodar testes
        run: pytest tests/ -v
        