name: Code Quality

on:
  push:

  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install ruff==0.16.0 black==26.5.1 isort==8.0.1

      - run: ruff check .

      - run: black --check .

      - run: isort --check-only .

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run lint

      - run: npm test
